<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文物分类 - 无人深空博物馆</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景星空效果 -->
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>无人深空博物馆</h1>
            </div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="categories.html" class="active">文物分类</a>
                <a href="search.html">搜索</a>
                <a href="about.html">关于</a>
            </div>
        </div>
    </nav>
    
    <!-- 页面标题 -->
    <header class="hero">
        <div class="container">
            <h1 class="hero-title">文物分类</h1>
            <p class="hero-subtitle">探索不同类型的宇宙文物</p>
        </div>
    </header>
    
    <!-- 分类网格 -->
    <section class="categories">
        <div class="container">
            <div class="category-grid">
                <a href="category.html?type=at" class="category-card">
                    <img src="at_1.png" alt="阿特拉斯文物" class="category-image">
                    <h3>阿特拉斯文物</h3>
                    <p>与阿特拉斯相关的神秘文物</p>
                    <p class="category-count">15 件文物</p>
                </a>
                <a href="category.html?type=bz" class="category-card">
                    <img src="bz_1.png" alt="标本类文物" class="category-image">
                    <h3>标本类文物</h3>
                    <p>各类生物和植物标本</p>
                    <p class="category-count">11 件文物</p>
                </a>
                <a href="category.html?type=js" class="category-card">
                    <img src="js_1.png" alt="技术装置" class="category-image">
                    <h3>技术装置</h3>
                    <p>先进的科技设备</p>
                    <p class="category-count">9 件文物</p>
                </a>
                <a href="category.html?type=sw" class="category-card">
                    <img src="sw_1.png" alt="生物文物" class="category-image">
                    <h3>生物文物</h3>
                    <p>各种奇特的生物样本</p>
                    <p class="category-count">11 件文物</p>
                </a>
                <a href="category.html?type=sy" class="category-card">
                    <img src="sy_1.png" alt="生物标本" class="category-image">
                    <h3>生物标本</h3>
                    <p>详细的生物标本记录</p>
                    <p class="category-count">2 件文物</p>
                </a>
                <a href="category.html?type=wx" class="category-card">
                    <img src="wx_1.png" alt="文献资料" class="category-image">
                    <h3>文献资料</h3>
                    <p>古老的文字和记录</p>
                    <p class="category-count">11 件文物</p>
                </a>
                <a href="category.html?type=yw" class="category-card">
                    <img src="yw_1.png" alt="遗物类文物" class="category-image">
                    <h3>遗物类文物</h3>
                    <p>古代文明的遗留物品</p>
                    <p class="category-count">10 件文物</p>
                </a>
                <a href="category.html?type=zg" class="category-card">
                    <img src="zg_1.png" alt="植物文物" class="category-image">
                    <h3>植物文物</h3>
                    <p>珍稀的植物样本</p>
                    <p class="category-count">8 件文物</p>
                </a>
                <a href="category.html?type=zw" class="category-card">
                    <img src="zw_1.png" alt="植物标本" class="category-image">
                    <h3>植物标本</h3>
                    <p>详细的植物标本记录</p>
                    <p class="category-count">7 件文物</p>
                </a>
            </div>
        </div>
    </section>
    
    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 无人深空博物馆</p>
        </div>
    </footer>
    
    <script src="js/analytics.js"></script>
    <script>
        // 导航栏激活状态管理
        function setActiveNavLink() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-links a');
            
            navLinks.forEach(link => {
                const linkPath = new URL(link.href).pathname;
                if (currentPath === linkPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            setActiveNavLink();
        });
    </script>
</body>
</html>
