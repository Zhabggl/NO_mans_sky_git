<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员上传系统 - 无人深空博物馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a192f;
            color: #8892b0;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(23, 42, 69, 0.8);
            border-radius: 10px;
            padding: 30px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #00f0ff;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        .upload-area {
            border: 2px dashed rgba(0, 240, 255, 0.5);
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            background: rgba(10, 25, 47, 0.6);
        }
        
        .upload-area:hover {
            border-color: #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        
        .upload-area.dragover {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
        }
        
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #00f0ff;
        }
        
        .upload-text {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            font-size: 0.9rem;
            color: #8892b0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #00f0ff;
            font-weight: bold;
        }
        
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 5px;
            background: rgba(10, 25, 47, 0.8);
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .rarity-options {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        
        .rarity-option {
            flex: 1;
            padding: 8px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .rarity-option:hover {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
        }
        
        .rarity-option.selected {
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.2);
            color: #00f0ff;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(10, 25, 47, 0.8);
            border-radius: 5px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f0ff, #8a2be2);
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .status-message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        
        .status-success {
            background: rgba(0, 255, 128, 0.2);
            color: #00ff80;
            border: 1px solid rgba(0, 255, 128, 0.5);
        }
        
        .status-error {
            background: rgba(255, 0, 64, 0.2);
            color: #ff0040;
            border: 1px solid rgba(255, 0, 64, 0.5);
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .primary-btn {
            background: linear-gradient(90deg, #00f0ff, #8a2be2);
            color: #0a192f;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }
        
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.8);
        }
        
        .secondary-btn {
            background: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        
        .secondary-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
        }
        
        .file-info {
            margin: 10px 0;
            padding: 10px;
            background: rgba(10, 25, 47, 0.6);
            border-radius: 5px;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }
        
        .file-info h4 {
            color: #00f0ff;
            margin-bottom: 5px;
        }
        
        .file-info p {
            margin: 5px 0;
        }
        
        .login-section {
            max-width: 500px;
            margin: 100px auto;
            background: rgba(23, 42, 69, 0.8);
            border-radius: 10px;
            padding: 30px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }
        
        .login-section h1 {
            margin-bottom: 20px;
        }
        
        .login-section .form-group {
            margin-bottom: 15px;
        }
        
        .login-section .btn {
            width: 100%;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .upload-area {
                padding: 20px;
            }
            
            .rarity-options {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="login-section" class="login-section">
        <h1>管理员登录</h1>
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <button class="btn primary-btn" id="login-btn">登录</button>
        <div id="login-message" class="status-message" style="display: none;"></div>
    </div>
    
    <div id="upload-section" class="container" style="display: none;">
        <h1>文物上传系统</h1>
        
        <!-- 拖放上传区域 -->
        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📁</div>
            <div class="upload-text">拖拽图片到此处或点击上传</div>
            <div class="upload-hint">支持 JPG、PNG、JPEG 格式，文件大小不超过 5MB</div>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>
        
        <!-- 文件信息 -->
        <div id="file-info" class="file-info" style="display: none;">
            <h4>文件信息</h4>
            <p><strong>文件名:</strong> <span id="file-name">未选择文件</span></p>
            <p><strong>文件大小:</strong> <span id="file-size">0 KB</span></p>
            <p><strong>预计保存路径:</strong> <span id="file-path">-</span></p>
        </div>
        
        <!-- 上传进度 -->
        <div id="upload-progress" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p style="text-align: center; margin-top: 10px;">上传进度: <span id="progress-percent">0%</span></p>
        </div>
        
        <!-- 状态消息 -->
        <div id="status-message" class="status-message" style="display: none;"></div>
        
        <!-- 表单 -->
        <form id="artifact-form">
            <div class="form-group">
                <label for="artifact-name">文物名称 *</label>
                <input type="text" id="artifact-name" placeholder="请输入文物名称" required>
            </div>
            
            <div class="form-group">
                <label for="artifact-category">文物类型 *</label>
                <select id="artifact-category" required>
                    <option value="">请选择文物类型</option>
                    <option value="at">阿特拉斯文物 (at)</option>
                    <option value="bz">标本类文物 (bz)</option>
                    <option value="js">技术装置 (js)</option>
                    <option value="sw">生物文物 (sw)</option>
                    <option value="sy">生物标本 (sy)</option>
                    <option value="wx">文献资料 (wx)</option>
                    <option value="yw">遗物类文物 (yw)</option>
                    <option value="zg">植物文物 (zg)</option>
                    <option value="zw">植物标本 (zw)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="artifact-description">文物简介 *</label>
                <textarea id="artifact-description" placeholder="请输入文物简介" required></textarea>
            </div>
            
            <div class="form-group">
                <label>稀有程度 *</label>
                <div class="rarity-options">
                    <div class="rarity-option" data-rarity="普通">普通</div>
                    <div class="rarity-option" data-rarity="稀有">稀有</div>
                    <div class="rarity-option" data-rarity="罕见">罕见</div>
                    <div class="rarity-option" data-rarity="传说">传说</div>
                </div>
                <input type="hidden" id="artifact-rarity" required>
            </div>
            
            <div class="form-group">
                <label>上传时间</label>
                <input type="text" id="upload-time" readonly>
            </div>
            
            <div class="form-group">
                <label>自动生成的文件名称</label>
                <input type="text" id="generated-filename" readonly>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button type="submit" class="btn primary-btn" id="submit-btn">上传文物</button>
                <button type="button" class="btn secondary-btn" id="cancel-btn">取消</button>
                <button type="button" class="btn secondary-btn" id="logout-btn">退出登录</button>
            </div>
        </form>
    </div>
    
    <script>
        // 全局变量
        let selectedFile = null;
        let currentUser = null;
        
        // 管理员账号密码（实际应用中应使用更安全的认证方式，如哈希存储）
        const adminCredentials = {
            username: 'admin',
            password: 'admin123'
        };
        
        // 生成随机token用于简单的CSRF保护
        function generateToken() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }
        
        // 存储token到localStorage
        function setCsrfToken() {
            const token = generateToken();
            localStorage.setItem('csrf_token', token);
            return token;
        }
        
        // 验证CSRF token
        function validateCsrfToken(token) {
            const storedToken = localStorage.getItem('csrf_token');
            return storedToken === token;
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initUploadArea();
            initForm();
            initLogin();
        });
        
        // 初始化登录功能
        function initLogin() {
            const loginBtn = document.getElementById('login-btn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginMessage = document.getElementById('login-message');
            
            // 生成CSRF token
            setCsrfToken();
            
            loginBtn.addEventListener('click', function() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                
                if (username === adminCredentials.username && password === adminCredentials.password) {
                    currentUser = username;
                    showUploadSection();
                } else {
                    showMessage(loginMessage, '用户名或密码错误', 'error');
                }
            });
            
            // 回车键登录
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });
        }
        
        // 显示上传区域
        function showUploadSection() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('upload-section').style.display = 'block';
        }
        
        // 显示登录区域
        function showLoginSection() {
            document.getElementById('upload-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-message').style.display = 'none';
        }
        
        // 初始化上传区域
        function initUploadArea() {
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('file-input');
            
            // 点击上传
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });
            
            // 拖放功能
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', function() {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                
                if (e.dataTransfer.files.length > 0) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });
            
            // 文件选择
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });
        }
        
        // 处理文件
        function handleFile(file) {
            // 验证文件类型
            const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];
            if (!validTypes.includes(file.type)) {
                showMessage(document.getElementById('status-message'), '只支持 JPG、PNG、JPEG 格式的图片', 'error');
                return;
            }
            
            // 验证文件大小
            if (file.size > 5 * 1024 * 1024) {
                showMessage(document.getElementById('status-message'), '文件大小不能超过 5MB', 'error');
                return;
            }
            
            selectedFile = file;
            updateFileInfo();
            
            // 生成文件预览
            generateFilePreview(file);
        }
        
        // 生成文件预览
        function generateFilePreview(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const fileInfo = document.getElementById('file-info');
                
                // 检查是否已有预览元素
                let previewElement = document.getElementById('file-preview');
                if (!previewElement) {
                    previewElement = document.createElement('div');
                    previewElement.id = 'file-preview';
                    previewElement.style.cssText = `
                        margin-top: 15px;
                        text-align: center;
                    `;
                    fileInfo.appendChild(previewElement);
                }
                
                // 创建预览图片
                let imgElement = previewElement.querySelector('img');
                if (!imgElement) {
                    imgElement = document.createElement('img');
                    imgElement.style.cssText = `
                        max-width: 200px;
                        max-height: 200px;
                        border-radius: 5px;
                        border: 1px solid rgba(0, 240, 255, 0.3);
                    `;
                    previewElement.appendChild(imgElement);
                }
                
                imgElement.src = e.target.result;
                imgElement.alt = file.name;
            };
            
            reader.readAsDataURL(file);
        }
        
        // 更新文件信息
        function updateFileInfo() {
            if (!selectedFile) return;
            
            document.getElementById('file-name').textContent = selectedFile.name;
            document.getElementById('file-size').textContent = formatFileSize(selectedFile.size);
            
            // 隐藏状态消息
            document.getElementById('status-message').style.display = 'none';
            
            // 显示文件信息
            document.getElementById('file-info').style.display = 'block';
        }
        
        // 初始化表单
        function initForm() {
            const categorySelect = document.getElementById('artifact-category');
            const rarityOptions = document.querySelectorAll('.rarity-option');
            const logoutBtn = document.getElementById('logout-btn');
            const cancelBtn = document.getElementById('cancel-btn');
            
            // 自动填充上传时间
            updateUploadTime();
            setInterval(updateUploadTime, 1000);
            
            // 分类选择事件
            categorySelect.addEventListener('change', function() {
                updateGeneratedFilename();
            });
            
            // 稀有程度选择
            rarityOptions.forEach(option => {
                option.addEventListener('click', function() {
                    rarityOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                    document.getElementById('artifact-rarity').value = this.dataset.rarity;
                });
            });
            
            // 退出登录
            logoutBtn.addEventListener('click', function() {
                currentUser = null;
                showLoginSection();
            });
            
            // 取消按钮
            cancelBtn.addEventListener('click', function() {
                resetForm();
            });
            
            // 表单提交
            document.getElementById('artifact-form').addEventListener('submit', function(e) {
                e.preventDefault();
                submitForm();
            });
            
            // 初始化文件名输入框
            initFilenameInput();
        }
        
        // 更新上传时间
        function updateUploadTime() {
            const now = new Date();
            const timeString = now.toISOString().slice(0, 10); // 只显示到天
            document.getElementById('upload-time').value = timeString;
        }
        
        // 更新生成的文件名
        function updateGeneratedFilename() {
            const category = document.getElementById('artifact-category').value;
            if (!category) {
                document.getElementById('generated-filename').value = '';
                document.getElementById('file-path').textContent = '-';
                return;
            }
            
            // 生成文件名
            const filename = generateFilename(category);
            
            // 检查输入框是否被用户手动修改
            const filenameInput = document.getElementById('generated-filename');
            const currentValue = filenameInput.value;
            
            // 如果输入框为空或者是之前自动生成的值，则更新为新生成的文件名
            if (!currentValue || currentValue === filenameInput.dataset.autoGenerated) {
                filenameInput.value = filename;
                filenameInput.dataset.autoGenerated = filename;
            }
            
            document.getElementById('file-path').textContent = `uploads/${category}/${filenameInput.value}`;
        }
        
        // 监听文件名输入框的变化
        function initFilenameInput() {
            const filenameInput = document.getElementById('generated-filename');
            filenameInput.addEventListener('input', function() {
                // 当用户手动修改时，更新文件路径显示
                const category = document.getElementById('artifact-category').value;
                if (category) {
                    document.getElementById('file-path').textContent = `uploads/${category}/${this.value}`;
                }
            });
        }
        
        // 生成文件名
        function generateFilename(category) {
            // 获取当前分类的最大编号
            const maxId = getMaxIdForCategory(category);
            const newId = maxId + 1;
            return `${category}_${newId}.png`;
        }
        
        // 获取分类的最大编号
        function getMaxIdForCategory(category) {
            let maxId = 0;
            
            // 1. 检查已上传的文物，找到该分类下的最大编号
            const artifacts = JSON.parse(localStorage.getItem('artifacts') || '[]');
            
            artifacts.forEach(artifact => {
                // 确保是同一分类
                if (artifact.category === category) {
                    // 提取编号部分
                    try {
                        // 使用正则表达式提取数字部分
                        const regex = new RegExp(`^${category}_([0-9]+)`);
                        const idMatch = artifact.id.match(regex);
                        if (idMatch && idMatch[1]) {
                            const artifactId = parseInt(idMatch[1]);
                            if (!isNaN(artifactId) && artifactId > maxId) {
                                maxId = artifactId;
                            }
                        } else {
                            // 备用方案：分割字符串
                            const idParts = artifact.id.split('_');
                            if (idParts.length >= 2) {
                                // 提取数字部分
                                const numberPart = idParts[1].replace(/\D/g, '');
                                const artifactId = parseInt(numberPart);
                                if (!isNaN(artifactId) && artifactId > maxId) {
                                    maxId = artifactId;
                                }
                            }
                        }
                    } catch (error) {
                        console.error('提取编号失败:', error);
                    }
                }
            });
            
            // 2. 检查localStorage中存储的最大编号
            const storageKey = `maxId_${category}`;
            const storedMaxId = localStorage.getItem(storageKey);
            if (storedMaxId !== null) {
                const storedId = parseInt(storedMaxId);
                if (!isNaN(storedId) && storedId > maxId) {
                    maxId = storedId;
                }
            }
            
            // 3. 基于实际文件结构的默认值
            // 根据实际的文件夹结构设置默认最大编号
            const defaultMaxIds = {
                'at': 15,  // at_1.png 到 at_15.png
                'bz': 11,  // bz_1.png 到 bz_11.png
                'js': 9,   // js_1.png 到 js_9.png
                'sw': 13,  // sw_1.png 到 sw_13.png
                'sy': 2,   // sy_1.png, sy_1_1.png
                'wx': 11,  // wx_1.png 到 wx_11.png
                'yw': 10,  // yw_1.png 到 yw_10.png
                'zg': 8,   // zg_1.png 到 zg_8.png
                'zw': 7    // zw_1.png 到 zw_7.png
            };
            
            // 如果默认值大于当前最大值，使用默认值
            if (defaultMaxIds[category] && defaultMaxIds[category] > maxId) {
                maxId = defaultMaxIds[category];
            }
            
            return maxId;
        }
        
        // 更新分类的最大编号
        function updateMaxIdForCategory(category, newId) {
            const key = `maxId_${category}`;
            localStorage.setItem(key, newId.toString());
        }
        
        // 提交表单
        function submitForm() {
            // 验证表单
            if (!validateForm()) {
                return;
            }
            
            if (!selectedFile) {
                showMessage(document.getElementById('status-message'), '请选择要上传的图片', 'error');
                return;
            }
            
            // 显示上传进度
            document.getElementById('upload-progress').style.display = 'block';
            
            // 模拟上传过程
            simulateUpload();
        }
        
        // 验证表单
        function validateForm() {
            const name = document.getElementById('artifact-name').value.trim();
            const category = document.getElementById('artifact-category').value;
            const description = document.getElementById('artifact-description').value.trim();
            const rarity = document.getElementById('artifact-rarity').value;
            
            if (!name) {
                showMessage(document.getElementById('status-message'), '请输入文物名称', 'error');
                return false;
            }
            
            if (!category) {
                showMessage(document.getElementById('status-message'), '请选择文物类型', 'error');
                return false;
            }
            
            if (!description) {
                showMessage(document.getElementById('status-message'), '请输入文物简介', 'error');
                return false;
            }
            
            if (!rarity) {
                showMessage(document.getElementById('status-message'), '请选择稀有程度', 'error');
                return false;
            }
            
            return true;
        }
        
        // 实现真实文件上传功能
        function simulateUpload() {
            let progress = 0;
            const progressFill = document.getElementById('progress-fill');
            const progressPercent = document.getElementById('progress-percent');
            const statusMessage = document.getElementById('status-message');
            const category = document.getElementById('artifact-category').value;
            
            // 获取用户可能手动修改后的文件名
            const filenameInput = document.getElementById('generated-filename');
            let filename = filenameInput.value;
            
            // 提取文件名中的编号部分
            let newId = 1;
            try {
                // 尝试从文件名中提取编号
                const regex = new RegExp(`^${category}_([0-9]+)`);
                const idMatch = filename.match(regex);
                if (idMatch && idMatch[1]) {
                    newId = parseInt(idMatch[1]);
                } else {
                    // 如果文件名格式不正确，使用自动生成的编号
                    const maxId = getMaxIdForCategory(category);
                    newId = maxId + 1;
                    filename = `${category}_${newId}.png`;
                }
            } catch (error) {
                // 出错时使用自动生成的编号
                const maxId = getMaxIdForCategory(category);
                newId = maxId + 1;
                filename = `${category}_${newId}.png`;
            }
            
            // 读取文件并存储到localStorage
            const reader = new FileReader();
            reader.onload = function(e) {
                // 模拟上传进度
                const interval = setInterval(() => {
                    progress += 10;
                    progressFill.style.width = `${progress}%`;
                    progressPercent.textContent = `${progress}%`;
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        
                        // 存储文件数据到localStorage
                        const fileData = {
                            name: filename,
                            category: category,
                            data: e.target.result,
                            uploadTime: document.getElementById('upload-time').value,
                            artifactName: document.getElementById('artifact-name').value,
                            description: document.getElementById('artifact-description').value,
                            rarity: document.getElementById('artifact-rarity').value
                        };
                        
                        // 存储文件数据
                        localStorage.setItem(`artifact_${filename}`, JSON.stringify(fileData));
                        
                        // 存储文物列表
                        let artifacts = JSON.parse(localStorage.getItem('artifacts') || '[]');
                        artifacts.push({
                            id: filename,
                            name: document.getElementById('artifact-name').value,
                            category: category,
                            description: document.getElementById('artifact-description').value,
                            rarity: document.getElementById('artifact-rarity').value,
                            uploadTime: document.getElementById('upload-time').value
                        });
                        localStorage.setItem('artifacts', JSON.stringify(artifacts));
                        
                        // 更新localStorage中的最大编号
                        updateMaxIdForCategory(category, newId);
                        
                        // 更新文物数量统计
                        updateArtifactCount();
                        
                        // 完成上传
                        setTimeout(() => {
                            document.getElementById('upload-progress').style.display = 'none';
                            showMessage(statusMessage, '文物上传成功！', 'success');
                            
                            // 重置表单
                            setTimeout(() => {
                                resetForm();
                            }, 2000);
                        }, 500);
                    }
                }, 100);
            };
            
            reader.onerror = function() {
                document.getElementById('upload-progress').style.display = 'none';
                showMessage(statusMessage, '文件读取失败', 'error');
            };
            
            // 读取文件
            reader.readAsDataURL(selectedFile);
        }
        
        // 更新文物数量统计
        function updateArtifactCount() {
            // 从localStorage获取所有分类的文物数量
            const categories = ['at', 'bz', 'js', 'sw', 'sy', 'wx', 'yw', 'zg', 'zw'];
            let totalCount = 0;
            
            categories.forEach(category => {
                const maxId = getMaxIdForCategory(category);
                totalCount += maxId;
            });
            
            // 存储总文物数量
            localStorage.setItem('totalArtifacts', totalCount.toString());
        }
        
        // 重置表单
        function resetForm() {
            document.getElementById('artifact-form').reset();
            selectedFile = null;
            document.getElementById('file-info').style.display = 'none';
            document.getElementById('status-message').style.display = 'none';
            document.querySelectorAll('.rarity-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('generated-filename').value = '';
            document.getElementById('file-path').textContent = '-';
            
            // 清除文件预览
            const previewElement = document.getElementById('file-preview');
            if (previewElement) {
                previewElement.remove();
            }
        }
        
        // 显示消息
        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = `status-message status-${type}`;
            element.style.display = 'block';
            
            // 3秒后隐藏
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }
        
        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1048576) return (bytes / 1024).toFixed(2) + ' KB';
            else return (bytes / 1048576).toFixed(2) + ' MB';
        }
    </script>
</body>
